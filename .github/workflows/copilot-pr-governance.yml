name: Copilot PR Governance

on:
    pull_request:
        types: [opened, reopened, synchronize, ready_for_review]
    pull_request_review:
        types: [submitted]

permissions:
    contents: write
    pull-requests: write
    issues: write

concurrency:
    group: copilot-pr-governance-${{ github.event.pull_request.number || github.event.number }}
    cancel-in-progress: false

jobs:
    request-copilot-review:
        if: >-
            github.event_name == 'pull_request' &&
            startsWith(github.event.pull_request.head.ref, 'copilot/') &&
            startsWith(github.event.pull_request.base.ref, 'feat/')
        runs-on: ubuntu-latest
        steps:
            - name: Ask Copilot to review PR
              uses: actions/github-script@v7
              with:
                  script: |
                      const pr = context.payload.pull_request;
                      const marker = "<!-- copilot-governance:review-request -->";
                      const comments = await github.paginate(
                        github.rest.issues.listComments,
                        {
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: pr.number,
                          per_page: 100,
                        }
                      );

                      const alreadyRequested = comments.some((c) =>
                        typeof c.body === "string" && c.body.includes(marker)
                      );

                      if (alreadyRequested) {
                        core.info("Copilot review request marker already exists; skipping duplicate comment.");
                        return;
                      }

                      const body = `${marker}\n/copilot review`;
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: pr.number,
                        body
                      });

    handle-negative-review:
        if: >-
            github.event_name == 'pull_request_review' &&
            startsWith(github.event.pull_request.head.ref, 'copilot/') &&
            startsWith(github.event.pull_request.base.ref, 'feat/') &&
            github.event.review.state == 'changes_requested'
        runs-on: ubuntu-latest
        steps:
            - name: Comment remediation guidance
              uses: actions/github-script@v7
              with:
                  script: |
                      const pr = context.payload.pull_request;
                      const review = context.payload.review;
                      const marker = "<!-- copilot-governance:changes-requested -->";
                      const body = [
                        marker,
                        "Copilot review changes requested tespit etti.",
                        "Bu PR yeniden işlenecek ve linked issue uzerinden Copilot session tekrar aktive edilecek.",
                        "",
                        `Review notu: ${review.body || "(bos)"}`
                      ].join("\n");

                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: pr.number,
                        body
                      });

            - name: Reactivate Copilot via linked issue (best effort)
              uses: actions/github-script@v7
              with:
                  script: |
                      const pr = context.payload.pull_request;
                      const review = context.payload.review;
                      const text = `${pr.title}\n${pr.body || ""}`;
                      const match = text.match(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i);

                      if (!match) {
                        core.warning("Linked issue bulunamadi. PR aciklamasina 'Closes #<issue>' ekleyin.");
                        return;
                      }

                      const issueNumber = Number(match[1]);
                      const customInstructions = [
                        `PR #${pr.number} icin review changes requested alindi.`,
                        "Lutfen review geri bildirimlerini uygula ve ayni PR uzerine yeni commitler gonder.",
                        `Geri bildirim: ${review.body || "(bos)"}`
                      ].join(" ");

                      await github.request("POST /repos/{owner}/{repo}/issues/{issue_number}/assignees", {
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issueNumber,
                        assignees: ["copilot-swe-agent[bot]"],
                        agent_assignment: {
                          target_repo: `${context.repo.owner}/${context.repo.repo}`,
                          base_branch: pr.base.ref,
                          custom_instructions: customInstructions
                        }
                      });

    enable-auto-merge:
        if: >-
            github.event_name == 'pull_request_review' &&
            startsWith(github.event.pull_request.head.ref, 'copilot/') &&
            startsWith(github.event.pull_request.base.ref, 'feat/') &&
            github.event.review.state == 'approved'
        runs-on: ubuntu-latest
        steps:
            - name: Enable auto merge (squash)
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  REPO: ${{ github.repository }}
              run: |
                  gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash
