name: Copilot PR Governance

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, review_requested]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: copilot-pr-governance-${{ github.event.pull_request.number || github.event.number }}
  cancel-in-progress: false

jobs:
  mark-ready-when-session-finishes:
    if: >-
      github.event_name == 'pull_request' &&
      (
        github.event.action == 'review_requested' ||
        github.event.action == 'synchronize'
      ) &&
      github.event.pull_request.draft == true &&
      startsWith(github.event.pull_request.head.ref, 'copilot/') &&
      startsWith(github.event.pull_request.base.ref, 'feat/')
    runs-on: ubuntu-latest
    steps:
      - name: Convert draft PR to ready for review
        uses: actions/github-script@v7
        with:
          script: |
            const prFromPayload = context.payload.pull_request;
            if (!prFromPayload || typeof prFromPayload.number !== "number") {
              core.setFailed("No valid pull request found in the event payload.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = prFromPayload.number;

            let freshPr;
            try {
              const response = await github.rest.pulls.get({ owner, repo, pull_number });
              freshPr = response.data;
            } catch (error) {
              const status = error?.status;
              if (status === 404) {
                core.warning(
                  `PR #${pull_number} could not be fetched (404). This can indicate token/context access limits.`
                );
                return;
              }
              core.setFailed(`Failed to fetch PR #${pull_number}: ${error.message}`);
              return;
            }

            if (!freshPr.draft) {
              core.info(`PR #${pull_number} is already ready for review.`);
              return;
            }

            try {
              await github.request("POST /repos/{owner}/{repo}/pulls/{pull_number}/ready_for_review", {
                owner,
                repo,
                pull_number
              });
              core.info(`PR #${pull_number} converted from draft to ready for review.`);
            } catch (error) {
              const status = error?.status;
              if (status === 404) {
                core.warning(
                  `ready_for_review returned 404 for PR #${pull_number}. This is usually a permission/context issue.`
                );
                return;
              }
              if (status === 422) {
                core.info(`PR #${pull_number} cannot be converted (likely already non-draft).`);
                return;
              }
              core.setFailed(`Failed to convert PR #${pull_number} to ready for review: ${error.message}`);
            }

  request-copilot-review:
    if: >-
      github.event_name == 'pull_request' &&
      startsWith(github.event.pull_request.head.ref, 'copilot/') &&
      startsWith(github.event.pull_request.base.ref, 'feat/')
    runs-on: ubuntu-latest
    steps:
      - name: Ask Copilot to review PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const marker = "<!-- copilot-governance:review-request -->";

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const alreadyRequested = comments.some(
              (c) => typeof c.body === "string" && c.body.includes(marker)
            );

            if (alreadyRequested) {
              core.info("Copilot review request marker already exists; skipping duplicate comment.");
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `${marker}\n/copilot review`
            });

  handle-negative-review:
    if: >-
      github.event_name == 'pull_request_review' &&
      startsWith(github.event.pull_request.head.ref, 'copilot/') &&
      startsWith(github.event.pull_request.base.ref, 'feat/') &&
      github.event.review.state == 'changes_requested' &&
      github.event.review.user.login == 'copilot-pull-request-reviewer'
    runs-on: ubuntu-latest
    steps:
      - name: Comment remediation guidance
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const review = context.payload.review;
            const marker = "<!-- copilot-governance:changes-requested -->";
            const body = [
              marker,
              "Copilot review changes requested detected.",
              "Session will be reactivated via linked issue assignment.",
              "",
              `Review note: ${review.body || "(empty)"}`
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body
            });

      - name: Reactivate Copilot via linked issue (best effort)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const review = context.payload.review;
            const text = `${pr.title}\n${pr.body || ""}`;
            const match = text.match(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i);

            if (!match) {
              core.warning("Linked issue not found. Add 'Closes #<issue>' to PR body.");
              return;
            }

            const issueNumber = Number(match[1]);
            const customInstructions = [
              `Review for PR #${pr.number} returned changes requested.`,
              "Apply all review feedback and push commits to the same PR.",
              `Feedback: ${review.body || "(empty)"}`
            ].join(" ");

            await github.request("POST /repos/{owner}/{repo}/issues/{issue_number}/assignees", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: `${context.repo.owner}/${context.repo.repo}`,
                base_branch: pr.base.ref,
                custom_instructions: customInstructions
              }
            });

  handle-copilot-commented-review:
    if: >-
      github.event_name == 'pull_request_review' &&
      startsWith(github.event.pull_request.head.ref, 'copilot/') &&
      startsWith(github.event.pull_request.base.ref, 'feat/') &&
      github.event.review.state == 'commented' &&
      github.event.review.user.login == 'copilot-pull-request-reviewer'
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate Copilot review comments and decide next action
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const review = context.payload.review;

            const allReviewComments = await github.paginate(github.rest.pulls.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const actionableComments = allReviewComments.filter(
              (c) => c.pull_request_review_id === review.id && c.user?.login === "copilot-pull-request-reviewer"
            );

            if (actionableComments.length > 0) {
              const marker = "<!-- copilot-governance:commented-review-reactivation -->";

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `${marker}\nCopilot review produced ${actionableComments.length} actionable comments; reactivating session.`
              });

              const text = `${pr.title}\n${pr.body || ""}`;
              const match = text.match(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i);
              if (!match) {
                core.warning("Linked issue not found. Add 'Closes #<issue>' to PR body.");
                return;
              }

              const issueNumber = Number(match[1]);
              const customInstructions = [
                `PR #${pr.number} received commented Copilot review with actionable items.`,
                `Actionable comments count: ${actionableComments.length}.`,
                "Apply all review comments and push updates to the same PR."
              ].join(" ");

              await github.request("POST /repos/{owner}/{repo}/issues/{issue_number}/assignees", {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                assignees: ["copilot-swe-agent[bot]"],
                agent_assignment: {
                  target_repo: `${context.repo.owner}/${context.repo.repo}`,
                  base_branch: pr.base.ref,
                  custom_instructions: customInstructions
                }
              });

              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: "APPROVE",
              body: "Auto-approved by governance: Copilot review had no actionable inline comments."
            });

  enable-auto-merge:
    if: >-
      github.event_name == 'pull_request_review' &&
      startsWith(github.event.pull_request.head.ref, 'copilot/') &&
      startsWith(github.event.pull_request.base.ref, 'feat/') &&
      github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash
