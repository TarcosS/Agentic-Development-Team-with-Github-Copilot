name: On Session Over

# "session-over" label'ı eklendiğinde tetiklenir.
# 1. PR'ı draft'tan ready for review'a çevirir.
# 2. Copilot'u reviewer olarak atar.
on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: on-session-over-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  promote-and-request-review:
    if: >-
      github.event.label.name == 'session-over' &&
      startsWith(github.event.pull_request.head.ref, 'copilot/') &&
      startsWith(github.event.pull_request.base.ref, 'feat/')
    runs-on: ubuntu-latest
    steps:
      # ── 1. Draft → Ready for Review ──────────────────────────────────────
      - name: Mark PR ready for review (REST)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (!pr.draft) {
              core.info(`PR #${pr.number} is already ready for review. Skipping.`);
              return;
            }

            try {
              const { data: updated } = await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                draft: false,
              });

              if (updated.draft === false) {
                core.info(`PR #${updated.number} is now ready for review.`);
              } else {
                core.setFailed(`PR #${pr.number} is still draft after update call.`);
              }
            } catch (e) {
              core.setFailed(`Failed to mark PR #${pr.number} ready: ${e.message}`);
            }

      # ── 2. Copilot'u Reviewer Olarak Ata ─────────────────────────────────
      - name: Request Copilot review
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Mevcut review request'leri kontrol et — idempotency
            const { data: reviewers } = await github.rest.pulls.listRequestedReviewers({
              owner, repo, pull_number: pr.number,
            });

            const alreadyRequested = reviewers.users?.some(
              u => u.login === "copilot-pull-request-reviewer"
            );

            if (alreadyRequested) {
              core.info("Copilot is already a requested reviewer. Skipping.");
              return;
            }

            await github.rest.pulls.requestReviewers({
              owner,
              repo,
              pull_number: pr.number,
              reviewers: ["copilot-pull-request-reviewer"],
            });

            core.info(`Copilot review requested on PR #${pr.number}.`);

      # ── 3. "session-over" Label'ını Temizle ──────────────────────────────
      # Döngüde tekrar tetiklenmemesi için label'ı kaldır.
      - name: Remove session-over label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: "session-over",
              });
              core.info("Removed 'session-over' label.");
            } catch (err) {
              // Label zaten yoksa 404 gelir — problem değil
              if (err.status !== 404) throw err;
            }
